<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="url(#bg)" />
  <!-- Magnifying glass / scraper icon -->
  <circle cx="230" cy="220" r="100" fill="none" stroke="white" stroke-width="28" />
  <line x1="300" y1="290" x2="400" y2="390" stroke="white" stroke-width="28" stroke-linecap="round" />
  <!-- AI sparkle dots -->
  <circle cx="200" cy="190" r="12" fill="white" opacity="0.9" />
  <circle cx="250" cy="210" r="8" fill="white" opacity="0.7" />
  <circle cx="220" cy="250" r="10" fill="white" opacity="0.8" />
  <!-- "AI" text -->
  <text x="380" y="180" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="72" fill="white" opacity="0.9">AI</text>
</svg>
