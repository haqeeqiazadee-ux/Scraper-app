version: "3.8"

services:
  # ==========================================================================
  # Control Plane — FastAPI API server
  # ==========================================================================
  control-plane:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.control-plane
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://scraper:scraper@postgres:5432/scraper_db
      - REDIS_URL=redis://redis:6379/0
      - QUEUE_BACKEND=redis
      - STORAGE_TYPE=filesystem
      - STORAGE_PATH=/app/artifacts
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-1000}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-100}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # HTTP Worker — deterministic extraction
  # ==========================================================================
  worker-http:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker-http
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QUEUE_BACKEND=redis
      - WORKER_CONCURRENCY=${HTTP_WORKER_CONCURRENCY:-5}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # Browser Worker — Playwright-based extraction
  # ==========================================================================
  worker-browser:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker-browser
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QUEUE_BACKEND=redis
      - WORKER_CONCURRENCY=${BROWSER_WORKER_CONCURRENCY:-2}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # AI Worker — normalization and schema mapping
  # ==========================================================================
  worker-ai:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker-ai
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QUEUE_BACKEND=redis
      - WORKER_CONCURRENCY=${AI_WORKER_CONCURRENCY:-3}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # Hard-Target Worker — stealth browser with proxy/CAPTCHA
  # ==========================================================================
  worker-hard-target:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker-hard-target
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QUEUE_BACKEND=redis
      - WORKER_CONCURRENCY=${HARD_TARGET_WORKER_CONCURRENCY:-1}
      - PROXY_PROVIDER=${PROXY_PROVIDER:-}
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      - CAPTCHA_PROVIDER=${CAPTCHA_PROVIDER:-}
      - CAPTCHA_API_KEY=${CAPTCHA_API_KEY:-}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # PostgreSQL — metadata storage
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scraper_db
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d scraper_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Redis — queue and cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Prometheus — metrics collection
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # Grafana — dashboards and visualization
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/scraper-overview.json:/var/lib/grafana/dashboards/scraper-overview.json:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  artifacts:
  promdata:
  grafanadata:
