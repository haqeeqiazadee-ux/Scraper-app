apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scraper.fullname" . }}-config
  labels:
    {{- include "scraper.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  STORAGE_BACKEND: {{ .Values.config.storageBackend | quote }}
  QUEUE_BACKEND: {{ .Values.config.queueBackend | quote }}
  AI_PROVIDER: {{ .Values.config.aiProvider | quote }}
  DATABASE_HOST: {{ include "scraper.postgresql.host" . | quote }}
  DATABASE_PORT: {{ include "scraper.postgresql.port" . | quote }}
  DATABASE_NAME: {{ include "scraper.postgresql.database" . | quote }}
  DATABASE_USER: {{ include "scraper.postgresql.username" . | quote }}
  REDIS_HOST: {{ include "scraper.redis.host" . | quote }}
  REDIS_PORT: {{ include "scraper.redis.port" . | quote }}
  {{- range $key, $val := .Values.controlPlane.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
