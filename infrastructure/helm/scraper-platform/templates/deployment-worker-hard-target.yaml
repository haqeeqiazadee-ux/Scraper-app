apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scraper.fullname" . }}-worker-hard-target
  labels:
    {{- include "scraper.componentLabels" (list . "worker-hard-target") | nindent 4 }}
spec:
  replicas: {{ .Values.workerHardTarget.replicas }}
  selector:
    matchLabels:
      {{- include "scraper.componentSelectorLabels" (list . "worker-hard-target") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "scraper.componentSelectorLabels" (list . "worker-hard-target") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker-hard-target
          image: {{ include "scraper.image" (list . .Values.workerHardTarget.image) }}
          imagePullPolicy: {{ .Values.workerHardTarget.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "scraper.fullname" . }}-config
          env:
            - name: WORKER_TYPE
              value: hard_target
            - name: WORKER_CONCURRENCY
              value: "{{ .Values.workerHardTarget.concurrency }}"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "scraper.secretName" . }}
                  key: DATABASE_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "scraper.secretName" . }}
                  key: REDIS_PASSWORD
            {{- if .Values.workerHardTarget.proxyProvider }}
            - name: PROXY_PROVIDER
              value: "{{ .Values.workerHardTarget.proxyProvider }}"
            {{- end }}
            {{- if .Values.workerHardTarget.proxyApiKey }}
            - name: PROXY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "scraper.secretName" . }}
                  key: PROXY_API_KEY
            {{- end }}
            {{- if .Values.workerHardTarget.captchaProvider }}
            - name: CAPTCHA_PROVIDER
              value: "{{ .Values.workerHardTarget.captchaProvider }}"
            {{- end }}
            {{- if .Values.workerHardTarget.captchaApiKey }}
            - name: CAPTCHA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "scraper.secretName" . }}
                  key: CAPTCHA_API_KEY
            {{- end }}
          resources:
            {{- toYaml .Values.workerHardTarget.resources | nindent 12 }}
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
      volumes:
        - name: artifacts
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-artifacts" (include "scraper.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.workerHardTarget.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerHardTarget.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
