apiVersion: v1
kind: Service
metadata:
  name: {{ include "scraper.fullname" . }}-control-plane
  labels:
    {{- include "scraper.componentLabels" (list . "control-plane") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "scraper.componentSelectorLabels" (list . "control-plane") | nindent 4 }}
