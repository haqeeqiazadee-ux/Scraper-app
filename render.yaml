# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: scraper-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./scraper.db"
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: "INFO"
      - key: CORS_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false  # User sets manually in Render dashboard
