[build]
base = "apps/web"
command = "npm install && npm run build"
publish = "dist"

# Proxy API requests to Railway backend
[[redirects]]
from = "/api/*"
to = "https://scraper.exsel.ai/api/:splat"
status = 200
force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
