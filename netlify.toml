# =============================================================================
# Netlify Configuration — AI Scraping Platform Web Dashboard
# =============================================================================
# Deploys the React + Vite SPA from apps/web/
# API calls are proxied to the Railway-hosted backend
# =============================================================================

[build]
  base = "apps/web"
  command = "npm install && npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html for client-side routing
[[redirects]]
  from = "/api/*"
  to = "https://scraper-app-production-a471.up.railway.app/api/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (set in Netlify dashboard)
# VITE_API_URL = https://scraper-app-production-a471.up.railway.app/api/v1

[build.environment]
  NODE_VERSION = "20"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
